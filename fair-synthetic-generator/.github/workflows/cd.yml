# Continuous Deployment Workflow
# ===============================
# Handles versioned releases and package publishing

name: CD

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            publish_pypi:
                description: "Publish to PyPI"
                required: true
                default: true
                type: boolean
            publish_docker:
                description: "Publish Docker image"
                required: true
                default: true
                type: boolean

env:
    PYTHON_VERSION: "3.10"
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    # ==========================================
    # Pre-release Validation
    # ==========================================
    validate:
        name: Pre-release Validation
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest

            - name: Run quick test suite
              run: pytest tests/unit/ -v --tb=short -x

            - name: Validate version consistency
              run: |
                  python -c "
                  import re
                  import sys
                  from pathlib import Path

                  # Get version from pyproject.toml
                  pyproject = Path('pyproject.toml').read_text()
                  version_match = re.search(r'version = [\"']([^\"']+)[\"']', pyproject)
                  if not version_match:
                      print('Could not find version in pyproject.toml')
                      sys.exit(1)

                  version = version_match.group(1)
                  print(f'Package version: {version}')

                  # If this is a release, check tag matches
                  if '${{ github.event_name }}' == 'release':
                      tag_version = '${{ github.event.release.tag_name }}'.lstrip('v')
                      if version != tag_version:
                          print(f'Version mismatch: pyproject={version}, tag={tag_version}')
                          sys.exit(1)
                      print('✓ Version matches release tag')
                  "

    # ==========================================
    # Build Package
    # ==========================================
    build:
        name: Build Package
        runs-on: ubuntu-latest
        needs: [validate]
        outputs:
            version: ${{ steps.version.outputs.version }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install build tools
              run: |
                  python -m pip install --upgrade pip
                  pip install build wheel setuptools

            - name: Extract version
              id: version
              run: |
                  VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Package version: $VERSION"

            - name: Build package
              run: python -m build

            - name: Check package
              run: |
                  pip install twine
                  twine check dist/*

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 7

    # ==========================================
    # Publish to PyPI
    # ==========================================
    publish-pypi:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        needs: [build]
        if: github.event_name == 'release' || inputs.publish_pypi
        environment:
            name: pypi
            url: https://pypi.org/project/fair-synthetic-generator/
        permissions:
            id-token: write
        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  verbose: true

            - name: Publish to Test PyPI (for testing)
              if: github.event.release.prerelease
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/

    # ==========================================
    # Build and Push Docker Image
    # ==========================================
    publish-docker:
        name: Publish Docker Image
        runs-on: ubuntu-latest
        needs: [build]
        if: github.event_name == 'release' || inputs.publish_docker
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      VERSION=${{ needs.build.outputs.version }}

    # ==========================================
    # Create Release Notes
    # ==========================================
    release-notes:
        name: Generate Release Notes
        runs-on: ubuntu-latest
        needs: [build, publish-pypi, publish-docker]
        if: github.event_name == 'release'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate changelog
              id: changelog
              run: |
                  python -c "
                  import subprocess
                  import sys

                  # Get the previous tag
                  try:
                      prev_tag = subprocess.check_output(
                          ['git', 'describe', '--tags', '--abbrev=0', 'HEAD^'],
                          stderr=subprocess.DEVNULL
                      ).decode().strip()
                  except:
                      prev_tag = None

                  # Get commits since last tag
                  if prev_tag:
                      result = subprocess.run(
                          ['git', 'log', f'{prev_tag}..HEAD', '--oneline'],
                          capture_output=True, text=True
                      )
                  else:
                      result = subprocess.run(
                          ['git', 'log', '-20', '--oneline'],
                          capture_output=True, text=True
                      )

                  print(result.stdout)
                  " > changelog.txt

            - name: Update release
              uses: softprops/action-gh-release@v1
              with:
                  body_path: changelog.txt
                  files: |
                      dist/*.whl
                      dist/*.tar.gz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ==========================================
    # Notify on Success
    # ==========================================
    notify:
        name: Notify
        runs-on: ubuntu-latest
        needs: [publish-pypi, publish-docker]
        if: success()
        steps:
            - name: Summary
              run: |
                  echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Version: ${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Published Artifacts" >> $GITHUB_STEP_SUMMARY
                  echo "- **PyPI**: https://pypi.org/project/fair-synthetic-generator/${{ needs.build.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
                  echo "- **Docker**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
